<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#f9fafb" width="800" height="400" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Manual Process: Before RomAIx</text>

  <!-- Step 1: Lead Inquiry -->
  <rect x="40" y="80" width="140" height="80" rx="8" fill="white" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4"/>
  <text x="110" y="115" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Lead</text>
  <text x="110" y="135" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Inquiry</text>
  <text x="110" y="155" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">(Website Form)</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="120" x2="220" y2="120" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-gray)"/>

  <!-- Step 2: Queue -->
  <rect x="230" y="80" width="140" height="80" rx="8" fill="white" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4"/>
  <text x="300" y="115" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Sits in</text>
  <text x="300" y="135" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Queue</text>
  <text x="300" y="155" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">(6-24 hours)</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="120" x2="410" y2="120" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-gray)"/>

  <!-- Step 3: Agent Response -->
  <rect x="420" y="80" width="140" height="80" rx="8" fill="white" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4"/>
  <text x="490" y="115" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Agent</text>
  <text x="490" y="135" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Response</text>
  <text x="490" y="155" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="11">(Next Day)</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="120" x2="600" y2="120" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-gray)"/>

  <!-- Step 4: Cold Lead -->
  <rect x="610" y="80" width="140" height="80" rx="8" fill="white" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4"/>
  <text x="680" y="115" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Lead Gone</text>
  <text x="680" y="135" text-anchor="middle" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Cold</text>
  <text x="680" y="155" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="11">(12% Convert)</text>

  <!-- Timeline indicator -->
  <rect x="100" y="220" width="600" height="40" rx="4" fill="#fee2e2"/>
  <text x="400" y="245" text-anchor="middle" fill="#dc2626" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Response Time: 6-24 Hours - Lead Excitement Fades</text>

  <!-- Pain points -->
  <text x="150" y="300" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">- 150+ weekly inquiries with only 4 agents</text>
  <text x="150" y="320" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">- Leads contact competitors while waiting</text>
  <text x="150" y="340" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">- No qualification before sales conversation</text>
  <text x="150" y="360" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">- Lost revenue: $85 average per lead</text>
</svg>
